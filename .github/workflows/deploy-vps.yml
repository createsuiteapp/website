name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cs-website-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22022' }}
      VPS_PATH: ${{ secrets.VPS_PATH || '/home/createsuite' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ] || { echo "VPS_SSH_PRIVATE_KEY required" >&2; exit 1; }
          [ -n "$VPS_HOST" ] || { echo "VPS_HOST required" >&2; exit 1; }

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy static files
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            dist/ \
            "$VPS_USER@$VPS_HOST:$VPS_PATH/projects/cs-website/dist/"

      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "docker kill --signal=HUP cs-website-nginx 2>/dev/null || true"
